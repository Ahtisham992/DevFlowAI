version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devflow_postgres
    environment:
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow123
      POSTGRES_DB: devflow_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama
    container_name: devflow_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  ollama_data: